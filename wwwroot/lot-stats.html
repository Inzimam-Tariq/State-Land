    <script>
        const authToken = localStorage.getItem("pulse_token");
        let districtId = localStorage.getItem("districtId") || 1;
        let districtName = localStorage.getItem("districtName") || 1;

        let currentUserId = localStorage.getItem("pulse_userId") || 0;
        let currentUserName = localStorage.getItem("pulse_userName") || "Guest";

        // Function to properly initialize Select2 once
        function initializeSelect2Dropdowns() {
            console.log('Initializing Select2 dropdowns...');

            // Tehsil dropdown
            $('#ddlTehsil').select2({
                theme: 'bootstrap-5',
                width: '100%',
                placeholder: 'Select Tehsil',
                allowClear: true,
                dropdownParent: $('.filter-section'),
                minimumResultsForSearch: 10
            }).on('select2:open', function () {
                // Fix z-index issues
                $(this).data('select2').$dropdown.css('z-index', 9999);
            });

            // Mouza dropdown
            $('#ddlMouza').select2({
                theme: 'bootstrap-5',
                width: '100%',
                placeholder: 'Select Mouza',
                allowClear: true,
                dropdownParent: $('.filter-section'),
                minimumResultsForSearch: 10
            }).on('select2:open', function () {
                // Fix z-index issues
                $(this).data('select2').$dropdown.css('z-index', 9999);
            });

            console.log('Select2 dropdowns initialized');
        }

        // Update your $(document).ready function to include search setup
        $(document).ready(function () {
            // Initialize Select2 ONCE
            initializeSelect2Dropdowns();

            // Display current user info
            document.getElementById('currentUserId').textContent = currentUserName;
            document.getElementById('currentDistrictId').textContent = districtName;
            showData();
            loadDistrictData();
        });

        function getResultSet(resultSets, index) {
            return resultSets?.find(r => Number(r.resultSetIndex) === index)?.rows ?? [];
        }

        async function showData() {
            debugger
            const resultSets = await fetchData();
            if (!resultSets || resultSets.length === 0) return;

            const overview = getResultSet(resultSets, 0);
            const lotData = getResultSet(resultSets, 1);

            if (overview.length > 0) renderMauzaKPIs(overview[0]);
            if (lotData.length > 0) renderLotTable(lotData);
        }

        // Fetch and show data
        async function fetchData() {
            try {
                const res = await fetch("/api/Gis/ExecuteStoredProcedure", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${authToken}`
                    },
                    body: JSON.stringify({
                        procedureName: "i_GetLotBandiStats_V1",
                        parameters: {
                            MauzaId: 2386

        // Convert Sq Ft to A-K-M
        function convertSqFtToAKM(sqFt) {
            if (!sqFt || sqFt <= 0) return '0 M';

            const MARLA_PER_ACRE = 160;
            const MARLA_PER_KANAL = 20;
            const SQFT_PER_MARLA = 272.25;

            let totalMarla = sqFt / SQFT_PER_MARLA;
            const acres = Math.floor(totalMarla / MARLA_PER_ACRE);
            totalMarla = totalMarla - (acres * MARLA_PER_ACRE);
            const kanal = Math.floor(totalMarla / MARLA_PER_KANAL);
            totalMarla = totalMarla - (kanal * MARLA_PER_KANAL);
            const marla = Math.round(totalMarla * 100) / 100;

            let result = '';
            if (acres > 0) result += acres + ' A';
            if (kanal > 0) {
                if (result) result += ' - ';
                result += kanal + ' K';
            }
            if (marla > 0) {
                if (result) result += ' - ';
                result += marla + ' M';
            }

            if (!result) result = '0 M';
            return result;
        }

        // Helper function to force trigger events
        function forceTriggerEvent(element, eventName) {
            if (element) {
                // Native event
                element.dispatchEvent(new Event(eventName));

                // jQuery event if available
                if (typeof jQuery !== 'undefined' && jQuery.fn.trigger) {
                    $(element).trigger(eventName);
                }
            }
        }

        // Helper function to ensure dropdown is populated before setting value
        function setDropdownValue(dropdownId, value) {
            const dropdown = document.getElementById(dropdownId);
            if (!dropdown) return false;

            let attempts = 0;
            const maxAttempts = 10;

            return new Promise((resolve) => {
                const checkAndSet = () => {
                    attempts++;

                    // Check if the option exists
                    const optionExists = Array.from(dropdown.options).some(opt => opt.value === value);

                    if (optionExists) {
                        dropdown.value = value;
                        forceTriggerEvent(dropdown, 'change');
                        resolve(true);
                    } else if (attempts < maxAttempts) {
                        // Try again after a short delay
                        setTimeout(checkAndSet, 100);
                    } else {
                        // Option doesn't exist, try to add it
                        const option = document.createElement('option');
                        option.value = value;
                        option.text = value;
                        dropdown.appendChild(option);
                        dropdown.value = value;
                        forceTriggerEvent(dropdown, 'change');
                        resolve(true);
                    }
                };

                checkAndSet();
            });
        }

                                        </div>
                                    </div>
                                `;

            document.getElementById('toastContainer').insertAdjacentHTML('beforeend', toastHtml);

            const toastElement = document.getElementById(toastId);
            const toast = new bootstrap.Toast(toastElement);
            toast.show();

            toastElement.addEventListener('hidden.bs.toast', function () {
                this.remove();
            });
        }
