<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
      
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="css/style.css"  rel="stylesheet">

    <style>
        
        .profile-card-title {
            font-weight: 500;
            font-size: 14px;
            line-height: 20px;
            letter-spacing: -0.15px;
            color: #101828;
            margin-bottom: 1rem;
        }

        .form-control, .form-select {
            border-radius: 14px;
            border: 1px solid #E5E7EB;
            padding: 12px 16px;
            font-size: 14px;
            color: #0A0A0A;
            background-color: #F9FAFB;
        }

        .form-label {
            font-size: 12px;
            font-weight: 500;
            color: #99A1AF;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .upload-box {
            border: 2px dashed #d1d5db;
            border-radius: 10px;
            padding: 18px;
            text-align: center;
            color: #6b7280;
            cursor: pointer;
        }

        .upload-btn {
            font-weight: 500;
            font-size: 13px;
            line-height: 19.5px;
            letter-spacing: -0.08px;
            text-align: center;
            color:#FFFFFF; 
            border-radius: 14px;
            padding: 8px 20px;
            border: 0px;
            background: linear-gradient(90deg, #1FCF74 0%, #03A250 100%);
        }

        .upload-btn:hover {
            background: linear-gradient(90deg, #03A250 0%, #1FCF74 100%);
            color:#FFFFFF; 
        }

        .profile-img {
            width:110px;
            height: 110px;
            border-radius: 50%;
            background: #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: auto;
            font-size: 30px;
            color: #9ca3af;
        }
      
    </style>
</head>
<body>

<div id="topbar"></div>
<div id="sidebar"></div>

<div class="content">
    <!-- Spinner overlay -->
    <div id="spinner-overlay" class="spinner-overlay d-none">
        <div class="spinner-border text-success" role="status" style="width: 3rem; height: 3rem;">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>
    <div>
        <span class="content-title">My Profile</span>
        <p class="content-subtitle mt-1 mb-0">View and update your profile information</p>
    </div>

    <div class="row g-4 mt-1">

    <!-- LEFT FORM -->
        <div class="col-lg-8">
            <form id="personalInfo">
                <div class="dashboard-card">
                    <h6 class="profile-card-title">Personal Information</h6>
                    <div class="mb-3">
                        <label class="form-label" for="applicantId">Applicant ID</label>
                        <input type="text" name="applicantId" id="applicantId" class="form-control" value="AKAR-2026-015" readonly required>
                    </div>

                    <div class="row g-3">           
                        <div class="col-md-6">
                            <label class="form-label" for="fullName">Full Name</label>
                            <input type="text" class="form-control" name="fullName" id="fullName" value="Muhammad Ahmed" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="fatherName">Father's Name</label>
                            <input type="text" class="form-control" name="fatherName" id="fatherName" value="Ahmed Khan" required>
                        </div>
                    </div>

                    <div class="row g-3 mt-1">
                        <div class="col-md-4">
                            <label class="form-label" for="cnic">CNIC Number</label>
                            <input type="text" class="form-control" name="cnic" id="cnic" value="35202-1234567-1" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label" for="issueDate">Issue Date</label>
                            <input type="date" class="form-control" name="issueDate" id="issueDate" value="2025-01-15" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label" for="expiryDate">Expiry Date</label>
                            <input type="date" class="form-control" name="expiryDate" id="expiryDate" value="2035-01-15" required>
                        </div>
                    </div>

                    <div class="row g-3 mt-1">
                    <div class="col-md-4">
                        <label class="form-label" for="gender">Gender</label>
                        <select class="form-select" name="gender" id="gender" required>
                        <option>Male</option>
                        <option>Female</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label" for="dob">Date of Birth</label>
                        <input type="date" class="form-control" name="dob" id="dob" value="1996-02-21" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label" for="maritalStatus">Marital Status</label>
                        <select class="form-select" name="maritalStatus" id="maritalStatus" required>
                        <option>Married</option>
                        <option>Single</option>
                        </select>
                    </div>
                    </div>

                    <div class="row g-3 mt-1">
                        <div class="col-md-6">
                            <label class="form-label" for="mobile">Mobile Number</label>
                            <input type="text" class="form-control" name="mobile" id="mobile" value="0300-1234567" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="email">Email (Optional)</label>
                            <input type="email" class="form-control" name="email" id="email" value="ahmed@example.com">
                        </div>
                    </div>

                    <div class="mt-3">
                        <label class="form-label" for="occupation">Occupation</label>
                        <input type="text" class="form-control" name="occupation" id="occupation" value="Farmer" required>
                    </div>

                    <div class="mt-3">
                        <label class="form-label" for="residentialAddress">Residential Address</label>
                        <input type="text" class="form-control" name="residentialAddress" id="residentialAddress" value="House 123, Street 5, Vanike Tarar" required>
                    </div>

                    <div class="mt-3">
                        <label class="form-label" for="permanentAddress">Permanent Address</label>
                        <input type="text" class="form-control" name="permanentAddress" id="permanentAddress" value="House 123, Street 5, Vanike Tarar" required>
                    </div>

                    <div class="row g-3 mt-1">
                        <div class="col-md-4">
                            <label class="form-label" for="district">District</label>
                            <select class="form-select" name="district" id="district" required>
                            <option>Gujranwala</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label" for="tehsil">Tehsil</label>
                            <select class="form-select" name="tehsil" id="tehsil" required>
                            <option>Hafizabad</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label" for="mouza">Mouza</label>
                            <input type="text" class="form-control" name="mouza" id="mouza" value="Vanike Tarar" required>
                        </div>
                    </div>
                    <button class="btn primary-btn w-100 mt-4" id="btnSaveProfile"><i class="bi bi-floppy me-2"></i>Save Profile</button>
                </div>
            </form>
        </div> 

    <!-- RIGHT SIDE -->
       
        <div class="col-lg-4">

            <div class="dashboard-card mb-4">
                <h6 class="profile-card-title mb-3">Profile Photo</h6>

                <div class="profile-img mb-3">
                    <img  src="../images/dashboard/no-image.png" alt="Profile Photo" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">
                </div>

                <button class="btn upload-btn w-100"><i class="bi bi-camera me-2"></i>Upload Photo</button>
            </div>

            <!-- <div class="dashboard-card p-4">
                <h6 class="profile-card-title mb-3">Required Documents</h6>

                <div class="mb-3">
                    <label class="form-label">CNIC Front</label>
                    <div class="upload-box">⬆ Upload</div>
                </div>

                <div class="mb-3">
                    <label class="form-label">CNIC Back</label>
                   
                    <div class="upload-box">⬆  <input class="form-control form-control-lg" id="formFileLg" type="file"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Domicile Certificate</label>
                    <div class="upload-box">⬆ Upload</div>
                </div>

                <div>
                    <label class="form-label">Recent Photograph</label>
                    <div class="upload-box">⬆ Upload</div>
                </div>

            </div> -->

        </div>

    </div>
</div>

    <script src="js/layout.js"></script>
</body>
</html>
