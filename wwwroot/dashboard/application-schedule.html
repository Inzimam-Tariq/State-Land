<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Application Schedule</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="css/style.css"  rel="stylesheet">
    <style>
        .activity-table{
            border: 1px solid #F3F4F6 !important;
        }

        .table-heading{
            font-weight: 500;
            font-size: 14px;
            line-height: 20px;
            letter-spacing: -0.15px;
            padding: 16px !important;
            color: #101828 !important;
            background-color: #E9F6ED !important;
        }
        .table-data{
            padding: 16px !important;
            font-weight: 400;
            font-size: 14px;
            line-height: 20px;
            letter-spacing: 0px;
            text-transform: capitalize;
            color: #535454 !important;
        }

        thead tr th:first-child {
            border-top-left-radius: 16px;
        }
        thead tr th:last-child {
            border-top-right-radius: 16px;
        }

         tbody tr:last-child td:first-child {
            border-bottom-left-radius: 16px;
        }

         tbody tr:last-child td:last-child {
            border-bottom-right-radius: 16px;
        }
    </style>
</head>
<body>

    <div id="topbar"></div>
    <div id="sidebar"></div>

    <div class="content">
        <!-- Spinner overlay -->
        <div id="spinner-overlay" class="spinner-overlay d-none">
            <div class="spinner-border text-success" role="status" style="width: 3rem; height: 3rem;">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>

        <div class="d-flex">
            <span class="content-title">Application Schedule</span>
        </div>
        
        <div class="my-4" >
        <table class="table table-hover activity-table mb-0">
            <thead style="background-color: #E9F6ED;">
                <tr>
                    <th class="table-heading">Activity</th>
                    <th class="table-heading">Start Date</th>
                    <th class="table-heading">End Date</th>
                </tr>
            </thead>
            <tbody id="activity-body">
            
            </tbody>
        </table>
        </div>
    </div>
    <script>
      const showSpinner = () => { document.getElementById('spinner-overlay').classList.remove('d-none'); }
      const hideSpinner = () => {document.getElementById('spinner-overlay').classList.add('d-none'); }

        function fetchActivities() {
            return new Promise((resolve) => {
                setTimeout(() => {
                resolve([
                    { activity: "Application Receivings", start: "March 8, 2026", end: "April 16, 2026" },
                    { activity: "List Of Initial Applicants Display", start: "April 17, 2026", end: "April 17, 2026" },
                    { activity: "Scrutiny Of Tehsil Monitoring Committee", start: "April 18, 2026", end: "April 25, 2026" },
                    { activity: "List Of Eligible Applicants Display", start: "April 25, 2026", end: "April 25, 2026" },
                    { activity: "Appeal To District Collector", start: "April 25, 2026", end: "May 2, 2026" },
                    { activity: "Final List Of Eligible Applicants", start: "May 9, 2026", end: "May 9, 2026" },
                    { activity: "Computerized Balloting", start: "May 10, 2026", end: "May 17, 2026" },
                    { activity: "Payment Of Lease Money", start: "May 17, 2026", end: "May 24, 2026" },
                    { activity: "Allotment", start: "May 24, 2026", end: "June 1, 2026" },
                    { activity: "Possession Handover", start: "June 2, 2026", end: "June 9, 2026" }
                ]);
                }, 500); // simulate delay
            });
        }


        async function renderTable() {
            const tbody = document.getElementById('activity-body');
            tbody.innerHTML = '<tr><td colspan="3" class="text-center">Loading...</td></tr>';
            showSpinner();
            try {
                const data = await fetchActivities();

                tbody.innerHTML = ''; // clear loading

                data.forEach(item => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="table-data">${item.activity}</td>
                    <td class="table-data">${item.start}</td>
                    <td class="table-data">${item.end}</td>
                `;
                tbody.appendChild(row);
                });

            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="3" class="text-center text-danger">Failed to load data</td></tr>';
            }finally {
                hideSpinner();
            }
        }

        // Call function
        renderTable();
    </script>
    <script src="js/layout.js"></script>
</body>
</html>
