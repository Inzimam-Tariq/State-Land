<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse</title>


    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --forest-dark: #1B5E20;
            --forest-medium: #2E7D32;
            --forest-light: #4CAF50;
            --forest-lighter: #81C784;
            --forest-bg: #E8F5E9;
            --gold-accent: #FFD700;
            --earth-brown: #8D6E63;
            --text-dark: #1B5E20;
            --text-light: #388E3C;
            --white: #FFFFFF;
            --shadow: rgba(27, 94, 32, 0.15);
        }

        body {
            font-family: 'Poppins', 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(rgba(232, 245, 233, 0.9), rgba(232, 245, 233, 0.9)), url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=2070&q=80') no-repeat center center / cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Background Pattern */
        .bg-pattern {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 10% 20%, rgba(46, 125, 50, 0.08) 0%, transparent 20%), radial-gradient(circle at 90% 80%, rgba(46, 125, 50, 0.08) 0%, transparent 20%);
            z-index: -1;
        }

        /* Government Emblem */
        .punjab-emblem {
            position: absolute;
            top: 30px;
            left: 30px;
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--forest-dark), var(--forest-medium));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 11px;
            font-weight: bold;
            box-shadow: 0 4px 15px var(--shadow);
            border: 3px solid var(--white);
            z-index: 100;
            overflow: hidden;
        }

            .punjab-emblem::before {
                content: 'ਪੰਜਾਬ';
                font-family: 'Poppins', sans-serif;
                font-weight: 700;
                letter-spacing: 0.5px;
            }

        /* Login Container */
        .login-container {
            width: 100%;
            max-width: 450px;
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(27, 94, 32, 0.25);
            animation: fadeIn 0.6s ease-out;
            border: 1px solid var(--forest-lighter);
            position: relative;
            z-index: 10;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Leaf Decoration */
        .leaf-decoration {
            position: absolute;
            width: 120px;
            height: 120px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%234CAF50" opacity="0.15"><path d="M17 8C8 10 5.9 16.17 3.82 21.34L5.71 22l1.39-2.73C9.82 17.5 11 15 11 15s5.2-3.3 7.2-6.34l1.4.34C19.57 9.5 21 7 21 7c-2.8 0-5.43 1-7 1z"/></svg>');
            background-size: contain;
            background-repeat: no-repeat;
            z-index: 1;
        }

        .leaf-1 {
            top: -30px;
            left: -30px;
            transform: rotate(45deg);
        }

        .leaf-2 {
            bottom: -30px;
            right: -30px;
            transform: rotate(225deg);
        }

        /* Header Section */
        .login-header {
            background: linear-gradient(135deg, var(--forest-dark), var(--forest-medium));
            padding: 30px;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
            border-bottom: 4px solid var(--gold-accent);
        }

            .login-header::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background-image: radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.1) 2%, transparent 2%), radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.1) 2%, transparent 2%);
                background-size: 40px 40px;
                opacity: 0.3;
            }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .govt-logo-img {
            height: 60px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        .logo-text {
            text-align: left;
        }

        .header-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            color: white;
        }

        .header-subtitle {
            font-size: 14px;
            opacity: 0.9;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 400;
        }

        .scheme-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 15px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Form Section */
        .login-form {
            padding: 40px 35px;
            background: var(--white);
            position: relative;
        }

        .form-title {
            color: var(--forest-dark);
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 30px;
            text-align: center;
            position: relative;
        }

            .form-title::after {
                content: '';
                position: absolute;
                bottom: -10px;
                left: 50%;
                transform: translateX(-50%);
                width: 80px;
                height: 3px;
                background: linear-gradient(to right, var(--forest-light), var(--gold-accent));
                border-radius: 2px;
            }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

            .input-group i {
                position: absolute;
                left: 18px;
                top: 50%;
                transform: translateY(-50%);
                color: var(--forest-medium);
                font-size: 18px;
                z-index: 2;
            }

        .form-input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            border: 2px solid #E0E0E0;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            background: var(--forest-bg);
            color: var(--text-dark);
        }

            .form-input:focus {
                outline: none;
                border-color: var(--forest-light);
                box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
                background: white;
            }

            .form-input::placeholder {
                color: #78909C;
            }

        .password-toggle {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--forest-medium);
            cursor: pointer;
            font-size: 16px;
            z-index: 2;
        }

        .login-button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--forest-medium), var(--forest-dark));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Montserrat', sans-serif;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
            box-shadow: 0 6px 20px rgba(46, 125, 50, 0.3);
            position: relative;
            overflow: hidden;
        }

            .login-button::before {
                content: '';
                position: absolute;
                top: 0;
                left: -100%;
                width: 100%;
                height: 100%;
                background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
                transition: 0.5s;
            }

            .login-button:hover {
                background: linear-gradient(135deg, var(--forest-dark), var(--forest-medium));
                transform: translateY(-3px);
                box-shadow: 0 12px 25px rgba(46, 125, 50, 0.4);
            }

                .login-button:hover::before {
                    left: 100%;
                }

            .login-button:active {
                transform: translateY(0);
            }

        .forgot-password {
            text-align: center;
            margin-top: 25px;
        }

            .forgot-password a {
                color: var(--forest-medium);
                text-decoration: none;
                font-size: 14px;
                transition: color 0.3s;
                font-weight: 500;
                display: inline-flex;
                align-items: center;
                gap: 6px;
            }

                .forgot-password a:hover {
                    color: var(--forest-dark);
                    text-decoration: underline;
                }

        /* Footer */
        .login-footer {
            background: linear-gradient(to right, var(--forest-bg), #F1F8E9);
            padding: 25px;
            text-align: center;
            border-top: 1px solid var(--forest-lighter);
            position: relative;
        }

        .footer-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .footer-logo {
            height: 25px;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .copyright {
            font-size: 13px;
            color: var(--text-light);
            font-weight: 500;
        }

        .pulse-version {
            font-size: 11px;
            color: #78909C;
            margin-top: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        /* Error Message */
        .error-message {
            background: #FFEBEE;
            color: #C62828;
            padding: 14px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            border-left: 4px solid #F44336;
            box-shadow: 0 3px 10px rgba(244, 67, 54, 0.1);
        }

        /* Security Note */
        .security-note {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #78909C;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            .login-container {
                max-width: 100%;
                border-radius: 15px;
            }

            .login-form {
                padding: 30px 25px;
            }

            .login-header {
                padding: 25px 20px;
            }

            .header-title {
                font-size: 24px;
            }

            .govt-logo-img {
                height: 50px;
            }

            .punjab-emblem {
                display: none;
            }

            .leaf-decoration {
                display: none;
            }
        }

        /* Loading Animation */
        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Shake Animation for Errors */
        @keyframes shake {
            0%, 100% {
                transform: translateX(0);
            }

            10%, 30%, 50%, 70%, 90% {
                transform: translateX(-5px);
            }

            20%, 40%, 60%, 80% {
                transform: translateX(5px);
            }
        }
    </style>
</head>

<body>
    <div class="bg-pattern"></div>
    <!--<div class="punjab-emblem"></div>-->
    <div class="leaf-decoration leaf-1"></div>
    <div class="leaf-decoration leaf-2"></div>

    <div class="login-container">
        <!-- Header -->
        <div class="login-header">
            <!--<div class="logo-container">-->
            <!-- Punjab Government Logo -->
            <!--<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/9d/Government_of_Punjab_Logo.svg/320px-Government_of_Punjab_Logo.svg.png"
                     alt="Government of Punjab"
                     class="govt-logo-img">
                <div class="logo-text">
                    <h1 class="header-title">PULSE</h1>
                    <p class="header-subtitle">Punjab Urban Land Systems Enhancement</p>
                </div>
            </div>-->
            <div class="scheme-badge p-0">
                <i class="fas fa-tree"></i> State Land Auction Management Module
            </div>
        </div>

        <!-- Form -->
        <div class="login-form">
            <h2 class="form-title">State Land Portal Login</h2>

            <div class="error-message" id="errorMessage"></div>

            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text"
                       id="username"
                       class="form-input"
                       placeholder="Enter your username"
                       autocomplete="username">
            </div>

            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password"
                       id="password"
                       class="form-input"
                       placeholder="Enter your password"
                       autocomplete="current-password">
                <button type="button" class="password-toggle" id="togglePassword">
                    <i class="fas fa-eye"></i>
                </button>
            </div>

            <button class="login-button" onclick="login()" id="loginButton">
                <span id="buttonText"><i class="fas fa-sign-in-alt"></i> Login to Portal</span>
                <div class="loading-spinner" id="loadingSpinner"></div>
            </button>

            <div class="forgot-password">
                <a href="#" onclick="showForgotPassword()">
                    <i class="fas fa-key"></i> Forgot Password?
                </a>
            </div>

            <div class="security-note">
                <i class="fas fa-shield-alt"></i> Secure login with Punjab Government authentication
            </div>
        </div>

        <!-- Footer -->
        <div class="login-footer">
            <div class="footer-content">
                <!-- Punjab Government Text Logo -->
                <div style="font-family: 'Montserrat', sans-serif; font-weight: 700; color: var(--forest-dark); font-size: 16px; margin-bottom: 5px;">
                    <i class="fas fa-landmark"></i> Government of the Punjab
                </div>
                <div class="copyright">
                    © 2026 Punjab Urban Land Systems Enhancement. All rights reserved.
                </div>
                <div class="pulse-version">
                    <i class="fas fa-leaf"></i> PULSE v2.1 | Greenforest Theme
                </div>
            </div>
        </div>
    </div>

    <!-- User defined scripts-->
    <script src="/js/session-manager.js"></script>
    <script>
        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function () {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
                this.setAttribute('aria-label', 'Hide password');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
                this.setAttribute('aria-label', 'Show password');
            }
        });

        // Enter key to login
        document.getElementById('password').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                login();
            }
        });

        // Also allow Enter key in username field
        document.getElementById('username').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                document.getElementById('password').focus();
            }
        });

        async function login() {
            debugger
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorDiv = document.getElementById('errorMessage');
            const loginBtn = document.getElementById('loginButton');
            const buttonText = document.getElementById('buttonText');
            const loadingSpinner = document.getElementById('loadingSpinner');

            // Reset error
            errorDiv.style.display = 'none';
            errorDiv.textContent = '';

            // Validate inputs
            if (!username || !password) {
                showError('Please enter both username and password');
                return;
            }

            // Show loading
            buttonText.style.display = 'none';
            loadingSpinner.style.display = 'block';
            loginBtn.disabled = true;
            loginBtn.style.opacity = '0.8';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Requested-With': 'XMLHttpRequest'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });


                if (!response.ok) {
                    if (response.status === 401) {
                        throw new Error('Invalid username or password');
                    } else if (response.status === 403) {
                        throw new Error('Account is deactivated. Please contact administrator.');
                    } else if (response.status === 429) {
                        throw new Error('Too many login attempts. Please try again later.');
                    } else {
                        throw new Error(data.message || 'Login failed. Please try again.');
                    }
                }

                const data = await response.json();

                // Handle first-time login (password update required)
                if (data.requirePasswordUpdate === true) {
                    await showPasswordUpdateModal(data.userId);
                    return;
                }

                debugger
                // Save session and redirect
                saveSession(data);
                redirectToDashboard(data.roleId);

            } catch (error) {
                console.error('Login error:', error);
                showError(error.message || 'Server error. Please try again later.');
            } finally {
                // Reset button state
                buttonText.style.display = 'block';
                loadingSpinner.style.display = 'none';
                loginBtn.disabled = false;
                loginBtn.style.opacity = '1';
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';

            // Shake animation for error
            errorDiv.style.animation = 'none';
            setTimeout(() => {
                errorDiv.style.animation = 'shake 0.5s';
            }, 10);
        }

        // Enhanced Password Update Modal with Greenforest Theme
        async function showPasswordUpdateModal(userId) {
            const { value: formValues } = await Swal.fire({
                title: '<strong style="color: #1B5E20;">Update Your Password</strong>',
                html: `
                            <div style="text-align: left; padding: 2px">
                                <p style="color: #2E7D32; margin-bottom: 20px; font-size: 12px;">
                                    <i class="fas fa-shield-alt" style="color: #4CAF50;"></i> For security reasons, please update your default password.
                                </p>
                                <div style="margin-bottom: 20px;">
                                    <label style="display: block; margin-bottom: 8px; color: #1B5E20; font-weight: 600;">
                                        <i class="fas fa-key"></i> New Password
                                    </label>
                                    <input type="password" id="newPass" class="swal2-input" placeholder="Enter new password" style="width: 100%; border-color: #81C784;">
                                    <small style="color: #78909C; font-size: 12px; display: block; margin-top: 5px;">
                                        <i class="fas fa-info-circle"></i> Minimum 8 characters with letters and numbers
                                    </small>
                                </div>
                                <div style="margin-bottom: 15px;">
                                    <label style="display: block; margin-bottom: 8px; color: #1B5E20; font-weight: 600;">
                                        <i class="fas fa-check-circle"></i> Confirm Password
                                    </label>
                                    <input type="password" id="confirmPass" class="swal2-input" placeholder="Confirm new password" style="width: 100%; border-color: #81C784;">
                                </div>
                            </div>
                        `,
                showCloseButton: true,
                showCancelButton: false,
                focusConfirm: false,
                confirmButtonText: 'Update Password',
                confirmButtonColor: '#2E7D32',
                cancelButtonColor: '#d33',
                allowOutsideClick: false,
                allowEscapeKey: false,
                width: 500,
                padding: '2em',
                background: '#FFFFFF',
                customClass: {
                    popup: 'password-update-modal',
                    title: 'swal2-title-custom'
                },
                preConfirm: () => {
                    const p1 = document.getElementById('newPass').value;
                    const p2 = document.getElementById('confirmPass').value;

                    // Password validation
                    if (!p1 || !p2) {
                        Swal.showValidationMessage('Both fields are required');
                        return false;
                    }
                    if (p1.length < 8) {
                        Swal.showValidationMessage('Password must be at least 8 characters');
                        return false;
                    }
                    if (!/(?=.*[a-zA-Z])(?=.*\d)/.test(p1)) {
                        Swal.showValidationMessage('Password must contain letters and numbers');
                        return false;
                    }
                    if (p1 !== p2) {
                        Swal.showValidationMessage('Passwords do not match');
                        return false;
                    }
                    return { newPassword: p1 };
                }
            });

            if (!formValues) return;

            // Show loading in Swal
            Swal.fire({
                title: 'Updating Password...',
                text: 'Securing your account',
                allowOutsideClick: false,
                didOpen: () => {
                    Swal.showLoading();
                },
                background: '#FFFFFF',
                color: '#1B5E20'
            });

            try {
                const res = await fetch('api/auth/updatePassword', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: userId,
                        newPassword: formValues.newPassword
                    })
                });

                if (!res.ok) {
                    const errorData = await res.json();
                    throw new Error(errorData.message || 'Failed to update password');
                }

                await Swal.fire({
                    icon: 'success',
                    title: '<span style="color: #1B5E20;">Password Updated</span>',
                    html: `
                                <div style="text-align: center;">
                                    <div style="font-size: 48px; color: #4CAF50; margin-bottom: 15px;">
                                        <i class="fas fa-check-circle"></i>
                                    </div>
                                    <p style="color: #2E7D32; font-size: 16px; margin-bottom: 20px;">
                                        Your password has been successfully updated!
                                    </p>
                                    <p style="color: #78909C; font-size: 14px;">
                                        Please login again using your new password
                                    </p>
                                </div>
                            `,
                    confirmButtonColor: '#2E7D32',
                    confirmButtonText: 'Continue to Login',
                    background: '#FFFFFF'
                });

                // Clear password field
                document.getElementById('password').value = '';

            } catch (error) {
                await Swal.fire({
                    icon: 'error',
                    title: '<span style="color: #C62828;">Update Failed</span>',
                    text: error.message,
                    confirmButtonColor: '#C62828',
                    background: '#FFFFFF'
                });
            }
        }

        // Forgot Password Function
        function showForgotPassword() {
            Swal.fire({
                title: '<span style="color: #1B5E20;">Reset Password Assistance</span>',
                html: `
                            <div style="text-align: center;">
                                <div style="font-size: 48px; color: #4CAF50; margin-bottom: 20px;">
                                    <i class="fas fa-user-lock"></i>
                                </div>
                                <p style="color: #2E7D32; margin-bottom: 15px;">
                                    Contact your system administrator for password reset:
                                </p>
                                <div style="background: #E8F5E9; padding: 15px; border-radius: 10px; margin-bottom: 20px;">
                                    <p style="color: #1B5E20; font-weight: bold; margin-bottom: 5px;">
                                        <i class="fas fa-envelope"></i> support@punjabland.gov.pk
                                    </p>
                                    <p style="color: #388E3C; font-size: 14px;">
                                        <i class="fas fa-phone"></i> 042-99200000 (Ext: 1234)
                                    </p>
                                </div>
                                <p style="color: #78909C; font-size: 13px;">
                                    <i class="fas fa-info-circle"></i> Please provide your username and employee ID when contacting support
                                </p>
                            </div>
                        `,
                icon: 'info',
                confirmButtonColor: '#2E7D32',
                confirmButtonText: 'OK',
                background: '#FFFFFF',
                width: 500
            });
        }

        // Enhanced Role-based Redirection
        function redirectToDashboard(roleId) {
            // Show loading message with theme
            Swal.fire({
                title: '<span style="color: #1B5E20;">Redirecting...</span>',
                html: `
                            <div style="text-align: center;">
                                <div style="font-size: 48px; color: #4CAF50; margin-bottom: 15px;">
                                    <i class="fas fa-tree"></i>
                                </div>
                                <p style="color: #2E7D32;">Taking you to your dashboard</p>
                                <div style="margin-top: 20px; width: 100%; height: 4px; background: #E8F5E9; border-radius: 2px; overflow: hidden;">
                                    <div id="progress-bar" style="height: 100%; width: 0%; background: linear-gradient(to right, #81C784, #4CAF50); transition: width 1s linear;"></div>
                                </div>
                            </div>
                        `,
                allowOutsideClick: false,
                showConfirmButton: false,
                background: '#FFFFFF',
                didOpen: () => {
                    // Animate progress bar
                    const progressBar = document.getElementById('progress-bar');
                    let width = 0;
                    const interval = setInterval(() => {
                        if (width >= 100) {
                            clearInterval(interval);
                        } else {
                            width += 10;
                            progressBar.style.width = width + '%';
                        }
                    }, 100);
                }
            }); 

            setTimeout(() => {
                const dashboards = {
                    //1: 'superadmin-dashboard.html',
                    //2: 'admin-dashboard.html',
                    3: 'adcr-dashboard.html',
                    4: 'gis-manager.html',
                    //5: 'patwari-dashboard.html',
                    6: 'available-land-dashboard.html'
                };

                const dashboard = dashboards[roleId] || 'gis-manager.html';
                window.location.href = dashboard;
            }, 1500);
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function () {
            // Focus on username field
            document.getElementById('username').focus();

            // Add green placeholder styling
            const inputs = document.querySelectorAll('.form-input');
            inputs.forEach(input => {
                input.addEventListener('focus', function () {
                    this.style.borderColor = '#4CAF50';
                });

                input.addEventListener('blur', function () {
                    this.style.borderColor = '#E0E0E0';
                });
            });
        });
    </script>
