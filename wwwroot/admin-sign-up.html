<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apna Khait, Apna Rozgar</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #f5f7fa;
        }

        .left-section {
            background: url('images/admin/sign-up-background.png') no-repeat center center;
            background-size: cover;
            min-height: 100vh;
            position: relative;
            color: white;
            display: flex;
            align-items: flex-start;
            padding: 30px;
        }

        .left-overlay-text {
            font-size: 56px;
            font-weight: 500;
            line-height: 1.2;
            letter-spacing: -0.08px;
        }

        .left-overlay-text span {
            font-weight: 300 !important;
            margin-left: 88px;
        }

        .form-card {
            background: none;
            padding: 0 30px;
            width: 100%;
            /*max-width: 420px;*/
            /*box-shadow: 0 10px 30px rgba(0,0,0,0.1);*/
        }
        .form-title{
            text-align: center;
            margin-bottom: 20px;
        }

        .form-title  h4{
            color: #101828;
            font-weight: 500;
            font-size: 22px;
            line-height: 33px;
        }

        .form-title img {
            margin: 0 5px;
        }

        .form-control, .form-select {
            height: 45px;
            border-radius: 6px;
            font-size: 14px;
        }

        .form-label {
            font-size: 13px;
            font-weight: 500;
        }

        .btn-green {
            background-color: #1bb55c;
            color: #fff;
            border-radius: 8px;
            height: 45px;
            font-weight: 500;
        }

        .btn-green:hover {
            background-color: #179c4f;
        }

        @media (max-width: 768px) {
            .left-section {
                display: none;
            }
        }
        </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">

        <!-- LEFT IMAGE SECTION -->
        <div class="col-md-7 left-section">
            <div class="left-overlay-text">
                Apna Khait,<br>
               <span>Apna Rozgar</span> 
            </div>
        </div>

        <!-- RIGHT FORM SECTION -->
        <div class="col-md-5 d-flex align-items-center justify-content-center pt-4 py-2">
            <div class="form-card">

                <!-- Logos -->
                <div class="form-title">
                    <img src="/images/admin/plra-logo.png" alt="plra-logo" height="72">
                    <img src="/images/admin/punjab-govt-logo.png" alt="punjab-govt-logo" height="86">
                    <h4 class="mt-2">Apna Khait, Apna Rozgar</h4>
                </div>

                <p class="small text-muted mb-3">
                    Enter the following details to proceed
                </p>

                <form>

                    <div class="mb-2">
                        <label class="form-label">CNIC Number *</label>
                        <input type="text" class="form-control" placeholder="XXXXX-XXXXXXX-X">
                    </div>

                    <div class="mb-2">
                        <label class="form-label">Mobile Number *</label>
                        <input type="text" class="form-control" placeholder="03XX-XXXXXXX">
                    </div>

                    <div class="mb-2">
                        <label class="form-label">Full Name *</label>
                        <input type="text" class="form-control" placeholder="Enter your full name">
                    </div>

                    <div class="mb-2">
                        <label class="form-label">District *</label>
                        <select class="form-select">
                            <option selected disabled>Select</option>
                            <option>Lahore</option>
                            <option>Karachi</option>
                        </select>
                    </div>

                    <div class="mb-2">
                        <label class="form-label">Tehsil *</label>
                        <select class="form-select">
                            <option selected disabled>Select</option>
                        </select>
                    </div>

                    <div class="mb-2">
                        <label class="form-label">Mouza *</label>
                        <select class="form-select">
                            <option selected disabled>Select</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-green w-100">
                        Send OTP
                    </button>

                </form>
            </div>
        </div>

    </div>
</div>

</body>
</html>
